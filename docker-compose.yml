name: ttb-automate

services:

  ttb-app:
    build:
      context: ./python_app
      dockerfile: Dockerfile
    container_name: ttb-app
    ports:
      - "8004:8004"
    env_file:
      - .env
    environment:
      LOCAL_LLM_URL: http://assess:8000
    volumes:
      - ./python_app/templates:/app/templates:ro
      - ./python_app/static:/app/static:ro
      - ./python_app/routers:/app/routers:ro
      - ./README.md:/app/README.md:ro
      - ./SECURITY.md:/app/SECURITY.md:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ttb-network
    restart: unless-stopped

  assess:
    build:
      context: ./assessment-service/app
      dockerfile: Dockerfile
    container_name: ttb-assess
    expose:
      - "8000"
    environment:

      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: llava:7b
      TEXT_MODEL: qwen2.5:7b
      OCR_HOST: http://ocr:8001
      DATABASE_URL: postgresql://ttb:ttb@postgres:5432/ttb
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
      ocr:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - ttb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 300s

  ollama:
    build:
      context: ./ollama
      dockerfile: Dockerfile
    container_name: ttb-ollama
    expose:
      - "11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_KEEP_ALIVE: -1
      OLLAMA_NUM_PARALLEL: 1
      OLLAMA_MAX_LOADED_MODELS: 1
      OLLAMA_FLASH_ATTENTION: 1
    networks:
      - ttb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/version"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama-pull:
    build:
      context: ./ollama
      dockerfile: Dockerfile
    container_name: ttb-ollama-pull
    entrypoint: ["/pull-models.sh"]
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - ttb-network
    restart: "no"

  ocr:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    container_name: ttb-ocr
    expose:
      - "8001"
    networks:
      - ttb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ttb-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ttb
      POSTGRES_USER: ttb
      POSTGRES_PASSWORD: ttb
    volumes:
      - ./assessment-service/app/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ttb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ttb"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: ttb-n8n
    ports:
      - "15678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: "${N8N_USER:-admin}"
      N8N_BASIC_AUTH_PASSWORD: "${N8N_PASSWORD:-ttbexpress}"
      N8N_RUNNERS_ENABLED: "true"
      WEBHOOK_URL: "http://localhost:15678/"
      GENERIC_TIMEZONE: "America/New_York"
      TZ: "America/New_York"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_HIRING_BANNER_ENABLED: "false"
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
    entrypoint: >
      sh -c "
        n8n import:workflow --input=/workflows/ttb-assessment.json 2>/dev/null || true &&
        n8n start
      "
    depends_on:
      assess:
        condition: service_healthy
    networks:
      - ttb-network
    restart: unless-stopped

volumes:
  ollama-data:
  postgres-data:
  n8n-data:

networks:
  ttb-network:
    driver: bridge
