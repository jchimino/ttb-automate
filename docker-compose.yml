# TTB Automate — Unified Docker Compose Stack
#
# Services
# ─────────────────────────────────────────────
#   ttb-app       FastAPI web app          → http://localhost:8004
#   assess        LLM assessment service   → internal (http://assess:8000)
#   ollama        Local LLM server         → internal (http://ollama:11434)
#   ollama-pull   One-shot: pulls model, then exits
#   ocr           Tesseract OCR service    → internal (http://ocr:8001)
#   postgres      Audit log database       → internal (postgres:5432)
#   n8n           Workflow automation      → http://localhost:15678
#
# Quick start
# ─────────────────────────────────────────────
#   1. cp .env.example .env   # fill in SUPABASE_URL / SUPABASE_ANON_KEY if used
#   2. docker compose up --build
#
# GPU: remove the `deploy` block under `ollama` if you don't have the
# NVIDIA Container Toolkit installed.
#
# First boot: ollama-pull downloads llava:7b (~4.5 GB) + qwen2.5:7b (~4 GB).
# Subsequent starts reuse the ollama-data volume — no re-download.

name: ttb-automate

services:

  # ── TTB Automate Python App ──────────────────────────────────────────────
  # Starts as soon as postgres is ready — does NOT wait for the model download.
  # Label verification returns 502 until assess is up, but the site is live.
  ttb-app:
    build:
      context: ./python_app
      dockerfile: Dockerfile
    container_name: ttb-app
    ports:
      - "8004:8004"
    env_file:
      - .env
    environment:
      LOCAL_LLM_URL: http://assess:8000
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: llava:7b
    volumes:
      # Live-mount source files so changes take effect on restart without rebuild
      - ./python_app/templates:/app/templates:ro
      - ./python_app/static:/app/static:ro
      - ./python_app/routers:/app/routers:ro
      - ./README.md:/app/README.md:ro
      - ./SECURITY.md:/app/SECURITY.md:ro
    depends_on:
      postgres:
        condition: service_healthy
      assess:
        condition: service_healthy
    networks:
      - ttb-network
    restart: unless-stopped

  # ── LLM Assessment Orchestrator ─────────────────────────────────────────
  assess:
    build:
      context: ./assessment-service/app
      dockerfile: Dockerfile
    container_name: ttb-assess
    expose:
      - "8000"
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: llava:7b
      TEXT_MODEL: qwen2.5:7b
      OCR_HOST: http://ocr:8001
      DATABASE_URL: postgresql://ttb:ttb@postgres:5432/ttb
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
      ocr:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - ttb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 30s

  # ── Ollama Local LLM Server ──────────────────────────────────────────────
  # Built from ./ollama/Dockerfile (adds curl to the base image so the
  # healthcheck works reliably). Default entrypoint — no override.
  ollama:
    build:
      context: ./ollama
      dockerfile: Dockerfile
    container_name: ttb-ollama
    expose:
      - "11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_KEEP_ALIVE: -1        # keep model loaded in VRAM indefinitely
      OLLAMA_NUM_PARALLEL: 1       # one request at a time — avoids VRAM thrash
    networks:
      - ttb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/version"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    # ── GPU passthrough ────────────────────────────────────────────────────
    # CPU-only by default. To enable NVIDIA GPU acceleration:
    #   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build

  # ── One-shot model pull ──────────────────────────────────────────────────
  # Reuses the ollama build (Ubuntu + curl) so the shell handles JSON cleanly.
  # Pulls llava:7b (vision model) then qwen2.5:14b (text/reconcile fallback).
  # Exits 0 when both are done; assess waits on service_completed_successfully.
  ollama-pull:
    build:
      context: ./ollama
      dockerfile: Dockerfile
    container_name: ttb-ollama-pull
    entrypoint: ["/pull-models.sh"]
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - ttb-network
    restart: "no"

  # ── Tesseract OCR Microservice ───────────────────────────────────────────
  ocr:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    container_name: ttb-ocr
    expose:
      - "8001"
    networks:
      - ttb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── PostgreSQL Audit Log ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ttb-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ttb
      POSTGRES_USER: ttb
      POSTGRES_PASSWORD: ttb
    volumes:
      - ./assessment-service/app/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ttb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ttb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── n8n Workflow Automation ──────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: ttb-n8n
    ports:
      - "15678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: "${N8N_USER:-admin}"
      N8N_BASIC_AUTH_PASSWORD: "${N8N_PASSWORD:-ttbexpress}"
      N8N_RUNNERS_ENABLED: "true"
      WEBHOOK_URL: "http://localhost:15678/"
      GENERIC_TIMEZONE: "America/New_York"
      TZ: "America/New_York"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_HIRING_BANNER_ENABLED: "false"
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
    entrypoint: >
      sh -c "
        n8n import:workflow --input=/workflows/ttb-assessment.json 2>/dev/null || true &&
        n8n start
      "
    depends_on:
      assess:
        condition: service_healthy
    networks:
      - ttb-network
    restart: unless-stopped

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  ollama-data:
    driver: local
  postgres-data:
    driver: local
  n8n-data:
    driver: local

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  ttb-network:
    driver: bridge
