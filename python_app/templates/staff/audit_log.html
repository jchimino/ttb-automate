{% extends "base.html" %}

{% block title %}Audit Log - TTB Label Verification{% endblock %}

{% block content %}
<div class="min-h-screen flex flex-col bg-background">
    <!-- Header -->
    <header class="bg-primary text-primary-foreground">
        <div class="container mx-auto py-4 px-4">
            <div class="flex items-center justify-between">
                <a href="/staff/dashboard" class="flex items-center gap-3 hover:opacity-80">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                    <span>Back to Dashboard</span>
                </a>
                <button onclick="handleSignOut()" class="text-sm hover:opacity-80">Sign Out</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 container mx-auto py-8 px-4">
        <div class="max-w-6xl mx-auto">
            <div class="mb-8">
                <h2 class="text-2xl font-bold text-primary">Override Audit Log</h2>
                <p class="text-muted-foreground">Track and review all staff verification overrides</p>
            </div>

            <!-- Filters -->
            <div class="border border-border rounded-lg p-4 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-foreground mb-2">Start Date</label>
                        <input type="date" id="start-date" class="w-full px-3 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-secondary">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-foreground mb-2">End Date</label>
                        <input type="date" id="end-date" class="w-full px-3 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-secondary">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-foreground mb-2">Staff Member</label>
                        <select id="staff-filter" class="w-full px-3 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-secondary">
                            <option value="">All Staff</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-foreground mb-2">Search</label>
                        <input type="text" id="search-query" placeholder="Search notes..." class="w-full px-3 py-2 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-secondary">
                    </div>
                </div>
            </div>

            <!-- Audit Entries Table -->
            <div class="border border-border rounded-lg overflow-hidden">
                <table class="w-full">
                    <thead class="bg-primary text-primary-foreground">
                        <tr>
                            <th class="px-4 py-3 text-left">Date/Time</th>
                            <th class="px-4 py-3 text-left">Staff Member</th>
                            <th class="px-4 py-3 text-left">Field</th>
                            <th class="px-4 py-3 text-left">Original</th>
                            <th class="px-4 py-3 text-left">Override</th>
                            <th class="px-4 py-3 text-left">Note</th>
                        </tr>
                    </thead>
                    <tbody id="audit-table" class="divide-y divide-border">
                        <!-- Rows will be loaded here -->
                    </tbody>
                </table>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="text-center py-12 border border-border rounded-lg hidden">
                <p class="text-muted-foreground">No audit entries found</p>
            </div>
        </div>
    </main>
</div>

<script src="/static/js/audit-log.js"></script>
{% endblock %}
