# docker-compose.gpu.yml — NVIDIA GPU override
#
# Enables GPU acceleration for the Ollama service.
# Requires the NVIDIA Container Toolkit installed on the host.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build
#
# Without this file the stack runs in CPU-only mode.
# The pull-models.sh script automatically detects the GPU and pulls llava:7b
# in addition to qwen2.5:7b — no extra configuration needed.

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
